        function onCaptchaRedirect(token) {
            var url = '{https://townoflakehamilton.portal.iworq.net}'; //disable HTML-encoding
            if ((new RegExp('g-recaptcha-response')).test(url)) {
                var splitArr = url.split("g-recaptcha-response", 2)[0].split("{", 2);

            }
        }

            <script>
            function checkDate(input) {
                                    const test = input.value;
                    const day = new Date(test).getUTCDay();
                    if ([6, 0].includes(day)) {
                        input.value = '';
                        alert('Weekends are not available dates for inspections.');
                    }
                            }

            const inspectionUnavailableDates = [];

            function checkDateAvailability(input) {
                const test = input.value;
                let dateAccepted = true;
                for (const date of inspectionUnavailableDates) {
                    if (date === test) {
                        input.style.backgroundColor = 'red';
                        alert('This date has been marked as unavailable. Please select a different date for your inspection request.');
                        dateAccepted = false;

                    }
                }

                    input.style.backgroundColor = 'white';

            }
