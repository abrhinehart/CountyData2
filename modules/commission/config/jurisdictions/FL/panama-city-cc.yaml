  header_zone: narrow

extraction_notes:
  - "Uses ordinance numbers (e.g., Ord 3254.1, Ord 3267) instead of PZ case numbers."
  - "The .1/.2/.3 suffix links related actions for the same property: typically .1=annexation, .2=land use, .3=zoning. Preserve the full suffix."
  - "Two-hearing requirement: items appear at 'First of two public hearings' then 'Second and Final.' Extract reading_number as 'first' or 'second_final'."
  - "Includes parcel IDs (e.g., Parcel ID: 22869-000-000). Extract all parcel IDs."
  - "References backup documents by filename (e.g., 'AGENDA REQUEST 3254.1.PDF')."
  - "Plat approvals appear in the Consent Agenda."
  - "Quasi-Judicial Hearings cover annexation/land use/zoning for specific properties."
  - "Developer's agreements, reimbursement agreements, and CRA actions are development-relevant."
