# Land banker, developer, and build-to-rent reference data.
# Each entry includes a category to distinguish the entity's role:
#   - land_banker:  Holds lots in a circular pipeline with a builder (buys from and sells to the same builder)
#   - developer:    Develops or entitles land and sells finished lots to builders (one-way)
#   - btr:          Build-to-rent fund that buys finished homes from builders in bulk
#
# To add a new entity:
#   1. Add an entry with canonical_name, category, and all known aliases
#   2. Run: python seed_reference_data.py

