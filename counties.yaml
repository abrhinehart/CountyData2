# counties.yaml
# SPLIT IF FILE EXCEEDS 1500 LINES


company_indicators:
- INC
- LLC
- HOMES
- COMPANY
- INVESTMENTS
- LTD

counties:
  Bay:
    input_folder: "Z:/Shared/_Office_Shared/Adam/Code/Format/County Data/Bay"
    column_mapping:
      grantor: Grantor
      grantee: Grantee
      date: Record Date Search
      legal: Legal
      instrument: Doc Type
    phase_keywords:
      - Phase
      - Ph.?
      - PH
      - Unit
    lot_block_cutoffs: #rename for tighter code. DO I NEED ALL THESE ITEMS IN THE LIST?
      - Lot
      - Lots
      - Unit
      - Units
      - Blk
      - Block
      - BLK
    skiprows: 0
    delimiters:
      - ","
      - Parcel
    cleanup_patterns:
      - '^L\s*\d+(?:-\d+)?\s*'
      - '^LOTS?\s*\d+(?:-\d+)?\s*'

