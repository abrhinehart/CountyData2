# County Expansion Registry
# Shared county metadata across the real estate data platform.
# When adding a new county to ANY project, update this file first.
# Other projects can read this to know what to expect before writing code.
#
# Projects:
#   cd2  = CountyData2       (deed/transaction scraping)
#   bi   = Builder Inventory (ArcGIS parcel tracking)
#   pt   = Permit Tracker    (building permit scraping)
#   cr   = Commission Radar  (agenda/meeting document scraping)

# ─── STATE-LEVEL DEFAULTS ────────────────────────────────────────────────
states:
  FL:
    disclosure: full          # sale prices on deeds
    survey_system: plss       # Tallahassee Meridian
    comp_plan: mandatory      # Ch. 163 F.S.
    plat_approval: staff      # SB 784, eff. July 2025
    alias_quirks: []
    notes: "Primary state. 67 counties. Most use LandmarkWeb for deeds, ArcGIS for parcels."

  AL:
    disclosure: non-disclosure  # no sale prices on deeds; use mortgage cross-ref
    survey_system: plss         # St. Stephens / Huntsville Meridians
    comp_plan: optional         # enabling only, not mandated
    plat_approval: varies
    alias_quirks:
      - "Assessor data uses 'L L C' (spaced) — include both 'LLC' and 'L L C' alias forms"
    notes: "Non-disclosure state. Mortgage records can proxy sale price (40% attach rate). B2C auth portals."

  GA:
    disclosure: full
    survey_system: metes-and-bounds  # no PLSS
    comp_plan: mandatory             # Georgia Planning Act 1989
    plat_approval: varies
    alias_quirks: []
    notes: "Not yet active in any project. Metes-and-bounds legal descriptions (no PLSS)."

  SC:
    disclosure: full
    survey_system: metes-and-bounds
    comp_plan: de-facto-mandatory  # all 46 counties have plans
    plat_approval: varies
    alias_quirks: []
    notes: "Not yet active. 10-year plan update cycle."

  NC:
    disclosure: full
    survey_system: metes-and-bounds
    comp_plan: advisory  # Chapter 160D — plans don't legally bind zoning
    plat_approval: varies
    alias_quirks: []
    notes: "Not yet active. Plans are advisory; consistency statement sufficient for rezoning."

  TN:
    disclosure: full
    survey_system: metes-and-bounds
    comp_plan: optional  # Growth Policy Act requires growth boundaries, not full plans
    plat_approval: varies
    alias_quirks: []
    notes: "Not yet active. Growth Policy Act (1998) requires UGBs but not detailed comp plans."


